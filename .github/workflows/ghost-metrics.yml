name: 📊 Spectral Metrics & Enchantments

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  generate-spectral-metrics:
    runs-on: ubuntu-latest
    name: 🔮 Conjure Advanced Metrics
    if: github.repository_owner == 'Ktejas99'
    
    steps:
    - name: 👻 Spectral Metrics Collection
      uses: lowlighter/metrics@latest
      with:
        filename: spectral-metrics.svg
        token: ${{ secrets.METRICS_TOKEN }}
        user: Ktejas99
        
        # Core configuration
        template: classic
        base: header, activity, community, repositories, metadata
        config_timezone: America/New_York
        config_order: base.header, base.activity+community, base.repositories
        
        # Plugin configurations for maximum spectral power
        plugin_isocalendar: yes
        plugin_isocalendar_duration: full-year
        
        plugin_languages: yes
        plugin_languages_analysis_timeout: 15
        plugin_languages_categories: markup, programming
        plugin_languages_colors: github
        plugin_languages_limit: 8
        plugin_languages_sections: most-used
        plugin_languages_threshold: 0%
        
        plugin_topics: yes
        plugin_topics_mode: mastered
        plugin_topics_sort: stars
        plugin_topics_limit: 15
        
        plugin_habits: yes
        plugin_habits_from: 200
        plugin_habits_days: 14
        plugin_habits_facts: yes
        plugin_habits_charts: yes
        
        plugin_activity: yes
        plugin_activity_limit: 5
        plugin_activity_load: 300
        plugin_activity_days: 14
        plugin_activity_filter: all
        plugin_activity_visibility: all
        plugin_activity_timestamps: yes
        
        plugin_achievements: yes
        plugin_achievements_threshold: C
        plugin_achievements_secrets: yes
        plugin_achievements_display: detailed
        plugin_achievements_limit: 0
        
        # Spectral customization
        config_animations: yes
        optimize: css, xml, svg
        
    - name: 🌙 Deploy Spectral Artifacts
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        destination_dir: spectral-assets
