name: Refresh README timestamp
on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update last-updated in README.md
        run: |
          python - <<'PY'
          from datetime import datetime
          ts = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          try:
              s = open('README.md','r',encoding='utf-8').read()
          except FileNotFoundError:
              print('README.md not found, skipping')
              raise SystemExit(0)
          if '<!--LAST_UPDATED-->' in s:
              s = s.replace('<!--LAST_UPDATED-->','Last updated: ' + ts)
              open('README.md','w',encoding='utf-8').write(s)
              print('Updated README.md timestamp')
          else:
              print('Placeholder not found in README.md, nothing changed')
          PY

      - name: Commit & push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes"
          else
            git commit -m "chore: refresh README timestamp"
            git push
          fi
