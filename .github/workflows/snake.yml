name: ⚡ Shadow Army Extraction

on:
  schedule:
    - cron: "0 */8 * * *" # Shadow army awakens
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  shadow-extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 💀 Shadow Extraction Ritual
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Ktejas99
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00d9ff&color_dots=#1e90ff,#4169e1,#0080ff,#00bfff,#87ceeb
            
      - name: ⚡ Deploy Shadow Army
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
