name: Update Dragon Contribution Graph
on:
  schedule:
    - cron: "0 0 * * *"    # daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate dragon contribution SVG
        run: |
          mkdir -p assets
          python - <<'PY'
          # Generates a compact, animated SVG (dragon fly-over) into assets/dragon-contrib.svg
          import math, datetime
          cols = 14
          rows = 7
          cell = 16
          gap = 4
          pad = 10
          width = pad*2 + cols*cell + (cols-1)*gap
          height = pad*2 + rows*cell + (rows-1)*gap
          mid_y = height/2
          seed = int(datetime.datetime.utcnow().strftime("%j"))  # changes daily for subtle variation
          colors = ['#0b0f12', '#3b2418', '#7a2b12', '#ff7b00', '#ffd48a']
          rects = []
          for c in range(cols):
              for r in range(rows):
                  x = pad + c*(cell+gap)
                  y = pad + r*(cell+gap)
                  level = (c*3 + r*5 + seed) % 5
                  rects.append(f'<rect x="{x}" y="{y}" width="{cell}" height="{cell}" rx="3" fill="{colors[level]}"/>')
          # create a smooth path for the dragon to follow
          points = []
          for i in range(cols+1):
              px = pad + i*(cell+gap)
              py = mid_y + math.sin(i/1.6 + seed/20.0) * (rows*cell/3)
              points.append((px,py))
          # build quadratic path (approx)
          d = f"M {points[0][0]} {points[0][1]} "
          for i in range(1, len(points)):
              cx = (points[i-1][0] + points[i][0]) / 2
              cy = (points[i-1][1] + points[i][1]) / 2
              d += f"Q {points[i-1][0]} {points[i-1][1]} {cx} {cy} "
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {width} {height}" width="{width}" height="{height}" preserveAspectRatio="xMidYMid meet">
  <style>
    .bg{{fill:#071016}}
    .cell{{transition:fill .3s;}}
    .dragon-body{{fill:#ffb454; stroke:#ff6b00; stroke-width:1}}
    .dragon-wing{{fill:#ff6b00; opacity:.95}}
  </style>
  <rect width="100%" height="100%" class="bg"/>
  {"".join(rects)}
  <!-- invisible path used for motion -->
  <path id="flight" d="{d}" fill="none" stroke="none"/>
  <!-- dragon shape (simple, modern) -->
  <g id="dragon" transform="translate({points[0][0]},{points[0][1]}) scale(1.3)">
    <ellipse rx="7" ry="4" class="dragon-body"/>
    <path d="M -2 -1 L -10 -8 L 6 -4 Z" class="dragon-wing"/>
  </g>
  <!-- animate dragon along the path -->
  <g>
    <use href="#dragon">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight"/>
      </animateMotion>
    </use>
  </g>
</svg>'''
          with open('assets/dragon-contrib.svg','w', encoding='utf-8') as f:
              f.write(svg)
          print('WROTE assets/dragon-contrib.svg')
          PY

      - name: Commit & push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dragon-contrib.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dragon contribution graph"
            git push
          fi
